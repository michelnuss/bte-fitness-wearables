# Deploy BTE Fitness Wearables to Azure App Service
#
# PREREQUISITES (one-time setup):
#   1. Create an Azure App Service (see AZURE_SETUP.md)
#   2. Download the publish profile from the App Service's "Overview" blade
#   3. In your GitHub repo → Settings → Secrets → Actions, create a secret
#      named AZURE_WEBAPP_PUBLISH_PROFILE and paste the publish profile XML
#
# The workflow triggers on every push to the "main" branch.

name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}   # set in GitHub repo variables
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
